name: Daily Stats Update
on:
  schedule:
    - cron: '0 */1 * * *'  # Runs every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas numpy beautifulsoup4 playwright lxml pyarrow matplotlib requests
          playwright install chromium
          playwright install-deps chromium

      - name: Run Scraper
        run: |
             python Scraper.py
             python Scraper2.py

      - name: Commit and Push Dynamic Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/
          git commit -m "Auto-update dynamic stats" || echo "No changes to commit"
          git push